services:
  sharelatex:
    restart: always
    image: sharelatex/sharelatex
    container_name: sharelatex
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - 80:80
    stop_grace_period: 60s
    volumes:
      - /mnt/share/apps/overleaf/data:/var/lib/overleaf/data
      - /mnt/app/overleaf/compiles:/var/lib/overleaf/data/compiles
      - /mnt/app/overleaf/output:/var/lib/overleaf/data/output
    environment:
      OVERLEAF_APP_NAME: Overleaf Community Edition
      OVERLEAF_MONGO_URL: mongodb://mongo/sharelatex
      OVERLEAF_REDIS_HOST: redis
      REDIS_HOST: redis
      ENABLED_LINKED_FILE_TYPES: "project_file,project_output_file"
      ENABLE_CONVERSIONS: "true"
      EMAIL_CONFIRMATION_DISABLED: "true"
      SANDBOXED_COMPILES: "true"
      SANDBOXED_COMPILES_HOST_DIR_COMPILES: "/var/lib/overleaf/data/compiles"
      SANDBOXED_COMPILES_HOST_DIR_OUTPUT: "/var/lib/overleaf/data/output"
      DOCKER_RUNNER: "true"
      SANDBOXED_COMPILES_SIBLING_CONTAINERS: "true"

  mongo:
    restart: always
    image: mongo:4.4
    container_name: mongo
    volumes:
      - /mnt/share/apps/overleaf/mongo:/data/db
    environment:
      MONGO_INITDB_DATABASE: sharelatex
    healthcheck:
      test: echo 'db.stats().ok' | mongo localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    restart: always
    image: redis:6.2
    container_name: redis
    volumes:
      - /mnt/share/apps/overleaf/redis:/data
